services:
  shed-tournament-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app-network
      - lsio
    ports:
      - "4322:8000"
    env_file:
      - .env
    depends_on:
      - shed-tournament-db
    volumes:
      - ./backend:/app

  shed-tournament-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app-network
      - lsio
    ports:
      - "4321:80"
    depends_on:
      - shed-tournament-api
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:4321/shed"]
      interval: 30s
      timeout: 10s
      retries: 3

  shed-tournament-db:
    image: postgres:15
    restart: unless-stopped
    networks:
      - app-network
    env_file:
      - .env
    volumes:
      - ./bin/postgres_data:/var/lib/postgresql/data

networks:
  app-network:
    driver: bridge
  lsio:
    name: lsio

